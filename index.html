<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBO Stage Reveal — Component Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="hbo-stage-reveal.css">
  <link rel="preload" href="config.json" as="fetch" crossorigin>
  <link rel="preload" href="skins/default/skin.json" as="fetch" crossorigin>
  <link rel="preload" href="skins/default/skin.css" as="style">
  <link rel="preload" href="skins/default/HBOLogo.ttf" as="font" type="font/ttf" crossorigin>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; background: #0a0a0a; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }

    .demo-page { min-height: 100%; }

    .demo-header {
      text-align: center;
      padding: 32px 20px 20px;
    }
    .demo-header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .demo-header p {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }

    .demo-stack {
      display: flex;
      flex-direction: column;
    }

    .demo-cell {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    .demo-cell-stage {
      width: 100%;
      height: 100%;
    }

    .demo-cell-label {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 600;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.5);
      padding: 4px 14px;
      border-radius: 20px;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="demo-page">
    <div class="demo-header">
      <h1>HBO Stage Reveal Component</h1>
      <p>Two independent instances stacked full-width, each with its own skin and video player.</p>
    </div>

    <div class="demo-stack">
      <div class="demo-cell">
        <div class="demo-cell-label">Instance 1 — Default Skin</div>
        <div class="demo-cell-stage" id="stage-1"></div>
      </div>
      <div class="demo-cell">
        <div class="demo-cell-label">Instance 2 — Batman Skin</div>
        <div class="demo-cell-stage" id="stage-2"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { HBOStageReveal } from './hbo-stage-reveal.js';

    const stage1 = new HBOStageReveal(document.getElementById('stage-1'), {
      skin: 'default',
      showSkinPicker: true,
      showGenrePicker: true,
      width: '100%',
      height: '100%',
    });

    const stage2 = new HBOStageReveal(document.getElementById('stage-2'), {
      skin: 'batman',
      showSkinPicker: true,
      showGenrePicker: true,
      width: '100%',
      height: '100%',
    });
  </script>
</body>
</html>
